name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Prepare release asset
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set package version
        run: |
          version="${{ github.event.release.tag_name }}"
          sed -i "s/^version = \".*\"/version = \"${version}\"/" pyproject.toml
          cd "${{ github.workspace }}/custom_components/meteo_imgw_pib"
          sed -i "s/\"version\": \".*\"/\"version\": \"${version}\"/" manifest.json

      - name: Create zipped release package
        shell: bash
        run: |
          cd "${{ github.workspace }}/custom_components/meteo_imgw_pib"
          zip meteo_imgw_pib.zip -r ./

      - name: Upload zip to release
        uses: softprops/action-gh-release@fe965f7af51af5f2602596916f38a38df2e33de0  # v3.0.2
        with:
          files: ${{ github.workspace }}/custom_components/meteo_imgw_pib/meteo_imgw_pib.zip

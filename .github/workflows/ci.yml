name: CI

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          activate-environment: true
          python-version: 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Check format
        run: uv run ruff format --check .

      - name: Check types
        run: uv run ty check custom_components/meteo_imgw_pib

      - name: Run prek
        run: |
          uv run prek run \
            end-of-file-fixer \
            trailing-whitespace \
            check-added-large-files \
            check-yaml \
            check-json \
            check-toml \
            mixed-line-ending \
            --all-files

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 2

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
          activate-environment: true
          python-version: 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest --timeout=30 --cov=custom_components/meteo_imgw_pib --cov-report=xml --error-for-skips

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@a99c28d3f0da835de33ff2feb2e15691c7b9641f  # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
